name: Deploy ERP Laravel Ottimizzato

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Clona repo
      uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.2
        extensions: mbstring, bcmath, pdo, mysql

    - name: Sincronizza files Laravel via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.2.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ${{ secrets.FTP_DIR }}
        local-dir: ./
        exclude: |
          vendor
          node_modules
          .git*
          .github
          storage/*.key
          storage/logs*
          .env
          .env.* 
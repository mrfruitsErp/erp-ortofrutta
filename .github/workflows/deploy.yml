name: Deploy ERP Laravel PRO

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /
          protocol: ftp
          port: 21
          log-level: minimal
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/vendor/**
            **/storage/logs/**
            **/storage/app/**
            **/storage/framework/**
            **/storage/*.key
            **/.env
            **/.env.*
            !**/.env.example
            **/backup_locale.sql
            **/Dockerfile
            **/render.yaml
            **/.ftp-deploy-sync-state.json

      - name: Trigger composer install on server
        run: |
          curl -s "https://erp.mrfruits.it/composer.php?key=erp_secure_2026_X9kL" || true
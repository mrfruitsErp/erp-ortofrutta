name: Deploy ERP Laravel PRO

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.2.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /erp/
          protocol: ftp
          port: 21
          timeout: 600000
          exclude: |
            .git*
            .github
            node_modules
            storage/*.key
            storage/logs*
            .env
            .env.*